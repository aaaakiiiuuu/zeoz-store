<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEOZ Store</title><style>
body{
  margin:0;
  font-family:sans-serif;
  background:#050814;
  color:white;
  text-align:center;
}

h1{
  margin:20px;
  color:#4da3ff;
}

/* الأقسام */
.sections{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
  padding:20px;
}

.section{
  background:#0a1328;
  padding:15px;
  border-radius:15px;
  border:1px solid #1e90ff55;
  cursor:pointer;
}

/* المنتج */
.card{
  max-width:420px;
  margin:20px auto;
  background:#0a1328;
  border-radius:25px;
  padding:20px;
  box-shadow:0 0 25px #1e90ff55;
  display:none;
}

/* السلايدر */
.slider{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

.slide{
  min-width:100%;
}

.slide img{
  width:100%;
  height:300px;
  object-fit:cover;
  border-radius:15px;
}

/* الأزرار */
button{
  margin:10px;
  padding:10px 20px;
  background:#1e90ff;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

.price{
  font-size:20px;
  color:#4da3ff;
}
</style></head><body><h1>ZEOZ STORE</h1><!-- الأقسام --><div class="sections">
  <div class="section" onclick="showProduct()">حسابات فورت</div>
  <div class="section" onclick="go()">اشتراكات نتفلكس</div>
  <div class="section" onclick="go()">رينبو</div>
  <div class="section" onclick="go()">رشق متابعين</div>
</div><!-- المنتج --><div class="card" id="product">  <div class="slider" id="slider">
    <div class="slide"><img src="images/image1.jpg"></div>
    <div class="slide"><img src="images/image2.jpg"></div>
    <div class="slide"><img src="images/image3.jpg"></div>
    <div class="slide"><img src="images/image4.jpg"></div>
    <div class="slide"><img src="images/image5.jpg"></div>
    <div class="slide"><img src="images/image6.jpg"></div>
  </div>  <p>اسحب يمين أو يسار</p><button onclick="prev()">السابق</button>
<button onclick="next()">التالي</button>

  <p class="price">السعر: 250﷼</p><button onclick="go()">اطلب الآن</button>

</div><script>
const slider = document.getElementById("slider");

function next(){
  slider.scrollBy({ left:-slider.clientWidth, behavior:"smooth"});
}

function prev(){
  slider.scrollBy({ left:slider.clientWidth, behavior:"smooth"});
}

function go(){
  window.open("https://www.instagram.com/zeoz.store/", "_blank");
}

function showProduct(){
  document.getElementById("product").style.display="block";
}
</script></body>
</html>
