<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEOZ Store</title><style>
body{
  margin:0;
  font-family:sans-serif;
  background:#050814;
  color:white;
  text-align:center;
}

h1{
  margin:30px;
  color:#4da3ff;
}

.card{
  max-width:420px;
  margin:25px auto;
  background:#0a1328;
  border:1px solid #1e90ff55;
  border-radius:25px;
  padding:20px;
  box-shadow:0 0 25px #1e90ff55;
}

.slider{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  gap:12px;
  border-radius:18px;
  scroll-behavior:smooth;
}

.slider::-webkit-scrollbar{
  display:none;
}

.slide{
  min-width:100%;
  scroll-snap-align:center;
}

.slide img{
  width:100%;
  height:320px;
  object-fit:cover;
  border-radius:18px;
  border:1px solid #1e90ff44;
}

.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:12px;
}

.controls button,
.buy{
  padding:11px 18px;
  background:#1e90ff;
  border:none;
  border-radius:12px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.price{
  font-size:22px;
  font-weight:bold;
  color:#4da3ff;
}

.hint{
  color:#b7d8ff;
  font-size:14px;
}
</style></head><body><h1>حسابات فورت</h1><div class="card">
  <h2>images</h2>  <div class="slider" id="slider">
    <div class="slide"><img src="images/image1.png"></div>
    <div class="slide"><img src="images/image2.png"></div>
    <div class="slide"><img src="images/image3.png"></div>
    <div class="slide"><img src="images/image4.png"></div>
    <div class="slide"><img src="images/image5.png"></div>
    <div class="slide"><img src="images/image6.png"></div>
  </div>  <p class="hint">اسحب يمين أو يسار لمشاهدة الصور</p>  <div class="controls">
    <button onclick="prevSlide()">السابق</button>
    <button onclick="nextSlide()">التالي</button>
  </div>  <p class="price">السعر: 250﷼</p><button class="buy" onclick="buy()">اطلب الآن</button>

</div><script>
const slider = document.getElementById("slider");

function nextSlide(){
  slider.scrollBy({
    left: -slider.clientWidth,
    behavior: "smooth"
  });
}

function prevSlide(){
  slider.scrollBy({
    left: slider.clientWidth,
    behavior: "smooth"
  });
}

function buy(){
  window.open("https://www.instagram.com/zeoz.store/", "_blank");
}
</script></body>
</html>
